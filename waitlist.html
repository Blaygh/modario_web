<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modario — Join the Waitlist</title>
    <meta name="description" content="Join the Modario waitlist for early access." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <script src="./runtime-config.js"></script>
    <script>
      window.MODARIO_SUPABASE = window.MODARIO_SUPABASE || {
        url: 'https://bcaajafisvrttvinjfad.supabase.co',
        anonKey: 'sb_publishable_EzlbWXkh0hMbajPO63X6Vg_wvqTXvLh',
        functionName: 'join-waitlist',
      };
    </script>
  </head>
  <body>
    <header class="floating-header">
      <a class="header-brand" href="index.html" aria-label="Modario home">
        <img src="assets/modario-mark.svg" alt="Modario" />
      </a>
      <a class="header-cta" href="index.html">Back Home</a>
    </header>

    <main>
      <section class="final-cta reveal" id="waitlist" aria-labelledby="waitlist-title">
        <h2 id="waitlist-title">Join the Modario Waitlist</h2>
        <p>Be first to try weather-aware outfit planning and your virtual wardrobe.</p>
        <form class="waitlist-form" aria-label="Waitlist form" data-function-name="join-waitlist">
          <label class="sr-only" for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Email" required />
          <button type="submit">Join Waitlist</button>
        </form>
        <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <footer>
      <span>Modario</span>
      <nav aria-label="Footer">
        <a href="index.html">Home</a>
        <a href="waitlist.html">Waitlist</a>
        <a href="support.html">Support</a>
        <a href="terms.html">Terms</a>
        <a href="privacy.html">Privacy</a>
      </nav>
    </footer>

    <script type="module">
      const waitlistForm = document.querySelector('.waitlist-form');
      const emailInput = document.getElementById('email');
      const statusElement = document.getElementById('form-status');
      const pageUrl = new URL(window.location.href);

      const configuredFunctionName = waitlistForm?.dataset.functionName?.trim() || '';
      const supabaseConfig = window.MODARIO_SUPABASE || {};
      const functionName = configuredFunctionName || supabaseConfig.functionName || '';
      const supabaseUrl = supabaseConfig.url || '';
      const supabaseAnonKey = supabaseConfig.anonKey || '';

      const getFunctionEndpoint = () => {
        if (!supabaseUrl || !functionName) return '';
        return `${supabaseUrl.replace(/\/$/, '')}/functions/v1/${functionName}`;
      };

      const setFormStatus = (message, state) => {
        if (!statusElement) return;
        statusElement.textContent = message;
        statusElement.dataset.state = state;
      };

      const getMetadata = () => ({
        submitted_at: new Date().toISOString(),
        source_page: pageUrl.pathname,
        full_url: pageUrl.toString(),
        referrer: document.referrer || null,
        user_agent: navigator.userAgent,
      });

      waitlistForm?.addEventListener('submit', async (event) => {
        event.preventDefault();
        const submitButton = waitlistForm.querySelector('button[type="submit"]');
        const email = emailInput?.value.trim() || '';
        const singleEmailRegex = /^[^\s@,]+@[^\s@,]+\.[^\s@,]+$/;

        if (!singleEmailRegex.test(email)) {
          setFormStatus('Please enter one valid email address.', 'error');
          return;
        }

        const functionEndpoint = getFunctionEndpoint();
        if (!functionEndpoint || !supabaseAnonKey) {
          setFormStatus('Configuration error. Please try again later.', 'error');
          return;
        }

        submitButton.disabled = true;
        submitButton.textContent = 'Submitting...';
        setFormStatus('Submitting your request...', 'pending');

        try {
          const response = await fetch(functionEndpoint, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              apikey: supabaseAnonKey,
              Authorization: `Bearer ${supabaseAnonKey}`,
            },
            body: JSON.stringify({ email, metadata: getMetadata() }),
          });

          if (!response.ok) {
            throw new Error(`Waitlist request failed with status ${response.status}`);
          }

          waitlistForm.reset();
          setFormStatus('Success! You have been added to the waitlist.', 'success');
        } catch (_error) {
          setFormStatus('We could not submit your email. Please try again.', 'error');
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = 'Join Waitlist';
        }
      });
    </script>
  </body>
</html>
